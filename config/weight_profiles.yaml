# =============================================================================
# weight_profiles.yaml
# =============================================================================
# Profile-based weighting for topic ranking.
#
# Default profile: blind_citation
#   Default ranking answers:
#     "What is the strongest research topic based on evidence, citation merit,
#      novelty, gap clarity, and scholarly value?"
#
# Optional profiles answer:
#     "Among academically strong topics, which also help NIW, EB1A, FAANG/career,
#      healthcare/high-stakes positioning, speed, and publication strategy?"
#
# Hard rule (enforced in 08_confidence_gate.py):
#   A topic CANNOT be promoted to GO under a personal-goal profile unless it
#   is also "acceptable under blind_citation" (not in the bottom half, not
#   blocked by existing-work, not failed by negative-control sentinel).
#
# All 18 weight components must be defined per profile; missing components
# default to 0 (with a warning).
# =============================================================================

# ---- WEIGHT COMPONENTS (all profiles use this same list) -------------------
# - citation_potential        evidence-based citation forecast (academic merit)
# - topic_momentum            yoy growth, recent papers (academic momentum)
# - gap_clarity               clarity of the gap statement, future-work signals
# - novelty                   inverse of saturation_density (novelty signal)
# - saturation_penalty        applied as subtraction; high saturation hurts
# - existing_work_penalty     applied as subtraction; direct overlap hurts
# - artifact_value            artifact opportunity / dataset/benchmark value
# - venue_credibility         indexing, venue strength, peer-review weight
# - free_publication          no-APC bias (personal goal — 0 in blind_citation)
# - publication_speed         time-to-publish bias (personal goal)
# - methodological_rigor      reproducibility / methodology disclosure (academic)
# - healthcare_relevance      personal goal — 0 in blind_citation
# - high_stakes_relevance     personal goal — 0 in blind_citation
# - niw_value                 personal goal — 0 in blind_citation
# - eb1a_value                personal goal — 0 in blind_citation
# - faang_career_value        personal goal — 0 in blind_citation
# - execution_feasibility     resource/time-feasibility (personal goal)
# - ip_risk_penalty           applied as subtraction; always non-negative

# =============================================================================
# 1. blind_citation  (DEFAULT)
# =============================================================================
blind_citation:
  description: "Pure academic merit. Personal goals zeroed out. Default profile."
  is_personal_goal: false
  weights:
    citation_potential:    1.50
    topic_momentum:        1.00
    gap_clarity:           1.20
    novelty:               1.30
    saturation_penalty:   -0.80
    existing_work_penalty: -1.20
    artifact_value:        0.40
    venue_credibility:     1.00
    free_publication:      0.00
    publication_speed:     0.00
    methodological_rigor:  0.80
    healthcare_relevance:  0.00
    high_stakes_relevance: 0.00
    niw_value:             0.00
    eb1a_value:            0.00
    faang_career_value:    0.00
    execution_feasibility: 0.20
    ip_risk_penalty:      -0.80

